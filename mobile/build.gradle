plugins {
    id 'com.android.application'
    // 🎯 保持原本的 Kotlin 插件版本
    id 'org.jetbrains.kotlin.android' version '1.8.22'
}

android {
    namespace "de.rhaeus.dndsync"
    compileSdk 34

    def signingPropsFile = rootProject.file('signing.properties')
    def usePropertiesSigning = false

    if (signingPropsFile.exists()) {
        def properties = new Properties()
        signingPropsFile.withInputStream { properties.load(it) }

        android.signingConfigs {
            release {
                storeFile file(properties['STORE_FILE'])
                storePassword properties['STORE_PASSWORD']
                keyAlias properties['KEY_ALIAS']
                keyPassword properties['KEY_PASSWORD']
            }
        }
        usePropertiesSigning = true
    }

    signingConfigs {
        debugging {
            storeFile file('../debug.keystore')
            keyAlias 'androiddebugkey'
            storePassword 'android'
            keyPassword 'android'
        }
    }

    defaultConfig {
        applicationId "de.rhaeus.dndsync"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {  
        debug {  
            signingConfig signingConfigs.debugging  
        }  
        release {  
            if (usePropertiesSigning) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debugging
            }
            minifyEnabled false  
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'  
        }  
    }  

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // 🎯 讓 Kotlin 編譯器與 Java 17 完全對齊
    kotlinOptions {
        jvmTarget = '17'
    }

    // 🎯 核心注入：開啟 Jetpack Compose 引擎開關
    buildFeatures {
        compose true
    }

    // 🎯 核心注入：與 Kotlin 1.8.22 綁定的官方指定 Compose 編譯器插件版本
    composeOptions {
        kotlinCompilerExtensionVersion '1.4.8'
    }
}

dependencies {
    // 標準 Material 與相容性主題庫
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // 🎯 核心注入：Kotlin 核心支持庫
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"

    // 🎯 核心注入：Jetpack Compose 官方核心與 Material 3 UI 庫
    implementation 'androidx.activity:activity-compose:1.7.2'
    implementation "androidx.compose.ui:ui:1.4.3"
    implementation "androidx.compose.material3:material3:1.1.1" // 真正的 M3 組件
    implementation "androidx.compose.ui:ui-tooling-preview:1.4.3"

    // Google Play 穿戴裝置藍牙服務
    implementation 'com.google.android.gms:play-services-wearable:19.0.0'

    // 自動測試相關
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
