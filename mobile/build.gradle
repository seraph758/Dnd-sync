plugins {
    id 'com.android.application'
    // 🎯 核心注入：賦予這個純 Java 專案編譯和執行 Kotlin (.kt) 檔案的超能力
    id 'org.jetbrains.kotlin.android' version '1.8.22'
}

android {
    namespace "de.rhaeus.dndsync"
    compileSdk 34

    def signingPropsFile = rootProject.file('signing.properties')
    def usePropertiesSigning = false

    if (signingPropsFile.exists()) {
        def properties = new Properties()
        signingPropsFile.withInputStream { properties.load(it) }

        android.signingConfigs {
            release {
                storeFile file(properties['STORE_FILE'])
                storePassword properties['STORE_PASSWORD']
                keyAlias properties['KEY_ALIAS']
                keyPassword properties['KEY_PASSWORD']
            }
        }
        usePropertiesSigning = true
    }

    signingConfigs {
        debugging {
            storeFile file('../debug.keystore')
            keyAlias 'androiddebugkey'
            storePassword 'android'
            keyPassword 'android'
        }
    }

    defaultConfig {
        applicationId "de.rhaeus.dndsync"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {  
        debug {  
            signingConfig signingConfigs.debugging  
        }  
        release {  
            if (usePropertiesSigning) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debugging
            }
            minifyEnabled false  
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'  
        }  
    }  

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // 🎯 核心注入：讓 Kotlin 編譯器與 Java 17 的字節碼完全對齊
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // 標準 Material 與相容性主題庫
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // 🎯 核心注入：Kotlin 核心支持庫
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"

    // 🎯 視覺核心升級：將原本的 preference 舊庫替換為 Kotlin 專用的 -ktx 核心庫
    // 這個庫能完美將內建的 SwitchPreferenceCompat 引導至全局的 Material 3 樣式上
    implementation 'androidx.preference:preference-ktx:1.2.1'

    // Google Play 穿戴裝置藍牙服務
    implementation 'com.google.android.gms:play-services-wearable:19.0.0'

    // 自動測試相關
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
