plugins {
    id 'com.android.application'
}

def signingProps = new Properties()
def signingFile = rootProject.file("signing.properties")

if (signingFile.exists()) {
    signingProps.load(new FileInputStream(signingFile))
}

def githubRunNumber = System.getenv("GITHUB_RUN_NUMBER") ?: "1"

android {
    compileSdk 31

    defaultConfig {
        applicationId "de.rhaeus.dndsync"
        minSdk 24
        targetSdk 31

        versionCode githubRunNumber.toInteger()
        versionName "1.0.${githubRunNumber}"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            storeFile file(signingProps['STORE_FILE'])
            storePassword signingProps['STORE_PASSWORD']
            keyAlias signingProps['KEY_ALIAS']
            keyPassword signingProps['KEY_PASSWORD']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release

            minifyEnabled false

            proguardFiles getDefaultProguardFile(
                    'proguard-android-optimize.txt'
            ), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.3.1'
    implementation 'com.google.android.material:material:1.4.0'
    implementation 'com.google.android.gms:play-services-wearable:17.1.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.0'
    implementation 'androidx.preference:preference:1.1.1'

    testImplementation 'junit:junit:4.13.2'

    androidTestImplementation 'androidx.test.ext:junit:1.1.3'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'
}
