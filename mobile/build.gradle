plugins {
    id 'com.android.application'
}

def signingProps = new Properties()
def signingFile = rootProject.file("signing.properties")

if (signingFile.exists()) {
    signingProps.load(new FileInputStream(signingFile))
}

def githubRunNumber = System.getenv("GITHUB_RUN_NUMBER") ?: "1"

android {
    // 支援 Material 3 與 Android 14 的標準配置
    compileSdk 34

    defaultConfig {
        applicationId "de.rhaeus.dndsync"
        minSdk 26
        targetSdk 34

        versionCode githubRunNumber.toInteger()
        versionName "1.0.${githubRunNumber}"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            if (signingProps['STORE_FILE'] != null) {
                storeFile file(signingProps['STORE_FILE'])
                storePassword signingProps['STORE_PASSWORD']
                keyAlias signingProps['KEY_ALIAS']
                keyPassword signingProps['KEY_PASSWORD']
            }
        }
    }

    buildTypes {
        release {
            if (signingProps['STORE_FILE'] != null) {
                signingConfig signingConfigs.release
            } else {
                println "WARNING: Signing properties not found, building unsigned APK!"
            }

            minifyEnabled false
            proguardFiles getDefaultProguardFile(
                    'proguard-android-optimize.txt'
            ), 'proguard-rules.pro'
        }
    }

    // 關鍵：compileSdk 34 必須搭配 Java 17，否則 GitHub Actions 編譯現代依賴庫會報錯
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // 徹底移除舊版本，統一使用相容 Material 3 的現代穩定版本
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.12.0' // 提供 Theme.Material3
    implementation 'androidx.preference:preference:1.2.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // 移植雙端檢測與通訊必備的 Google 穿戴裝置服務
    implementation 'com.google.android.gms:play-services-wearable:19.0.0'

    // 測試相關依賴
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
