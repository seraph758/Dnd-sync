// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    // 🟢 移动到这里：在构建初始化时立刻执行压制 SDK 34 警告，完美符合 Gradle 铁律
    System.setProperty("android.suppressUnsupportedCompileSdk", "34")

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // 保持 8.0.2 版本以适配 Gradle 8.0
        classpath 'com.android.tools.build:gradle:8.0.2'
    }
}

plugins {
    // 🎯 核心升級：在根目錄定義全域 Kotlin 插件版本為 1.9.24
    id 'org.jetbrains.kotlin.android' version '1.9.24' apply false
}

// 🟢 其他非声明性打印日志，可以安全地放在 plugins 块下方
logger.warn("WearSync 编译提示: 已成功激活 suppressUnsupportedCompileSdk 为 SDK 34")

task clean(type: Delete) {
    delete rootProject.buildDir
}
