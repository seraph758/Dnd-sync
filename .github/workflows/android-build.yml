name: Build Mobile and Wear APKs

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 执行全局编译，生成所有模块的 APK
    - name: Build All APKs
      run: ./gradlew assembleDebug

    # 将手机端 APK 和手錶端 APK 一起上传
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: DND-Sync-Full-Build
        path: |
          app/build/outputs/apk/debug/*.apk
          wear/build/outputs/apk/debug/*.apk
          
