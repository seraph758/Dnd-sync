name: Build Wear OS Only

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 關鍵修改：只編譯 wear 模組的 Debug 版 APK
    - name: Build Wear APK Only
      run: ./gradlew :wear:assembleDebug

    # 只上傳手錶端的 APK 文件
    - name: Upload Wear APK
      uses: actions/upload-artifact@v4
      with:
        name: DND-Sync-Wear-Only
        path: wear/build/outputs/apk/debug/*.apk

