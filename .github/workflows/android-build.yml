name: Build and Release APKs

on:
  workflow_dispatch:
    inputs:
      build_mobile:
        description: '是否打包 Mobile APK'
        required: false
        default: 'true'
        type: boolean
      build_wear:
        description: '是否打包 Wear APK'
        required: false
        default: 'true'
        type: boolean
      push_release:
        description: '是否推送到 GitHub Release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_RUN_NUMBER: ${{ github.run_number }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Update Mobile build.gradle version
      if: ${{ github.event.inputs.build_mobile == 'true' }}
      run: |
        echo "更新 Mobile build.gradle 版本号为 $GITHUB_RUN_NUMBER"
        sed -i "s/versionCode [0-9]\+/versionCode $GITHUB_RUN_NUMBER/" mobile/build.gradle
        sed -i "s/versionName \".*\"/versionName \"1.0.$GITHUB_RUN_NUMBER\"/" mobile/build.gradle

    - name: Update Wear build.gradle version
      if: ${{ github.event.inputs.build_wear == 'true' }}
      run: |
        echo "更新 Wear build.gradle 版本号为 $GITHUB_RUN_NUMBER"
        sed -i "s/versionCode [0-9]\+/versionCode $GITHUB_RUN_NUMBER/" wear/build.gradle
        sed -i "s/versionName \".*\"/versionName \"1.0.$GITHUB_RUN_NUMBER\"/" wear/build.gradle

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore

    - name: Create signing properties
      run: |
        KEY_PATH=$GITHUB_WORKSPACE/release.keystore
        echo "STORE_FILE=$KEY_PATH" > signing.properties
        echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> signing.properties
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> signing.properties
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties
        ls -l $KEY_PATH

    - name: Build Release APKs
      run: ./gradlew clean assembleRelease

    - name: Copy APKs to root directory
      run: |
        echo "拷贝 APK 到根目录"
        if [ "${{ github.event.inputs.build_mobile }}" = "true" ]; then
          MOBILE_PATH=$(find . -path "*/mobile/build/outputs/apk/release/*" -name "*.apk" | head -n 1)
          if [ -f "$MOBILE_PATH" ]; then
            cp "$MOBILE_PATH" ./mobile-release.apk
            echo "Mobile APK 已拷贝到 ./mobile-release.apk"
          else
            echo "警告: 找不到 Mobile APK"
          fi
        fi

        if [ "${{ github.event.inputs.build_wear }}" = "true" ]; then
          WEAR_PATH=$(find . -path "*/wear/build/outputs/apk/release/*" -name "*.apk" | head -n 1)
          if [ -f "$WEAR_PATH" ]; then
            cp "$WEAR_PATH" ./wear-release.apk
            echo "Wear APK 已拷贝到 ./wear-release.apk"
          else
            echo "错误: 找不到 Wear APK"
            exit 1
          fi
        fi

        ls -lh *.apk || echo "无 APK 文件生成"

    - name: Create optional ZIP backup
      run: |
        echo "生成平铺 ZIP 备份 (可选)"
        FILES_TO_ZIP=""
        [ -f ./mobile-release.apk ] && FILES_TO_ZIP="./mobile-release.apk"
        [ -f ./wear-release.apk ] && FILES_TO_ZIP="$FILES_TO_ZIP ./wear-release.apk"

        if [ ! -z "$FILES_TO_ZIP" ]; then
          ZIP_NAME="wear-sync-v1.0.$GITHUB_RUN_NUMBER.zip"
          zip -j "$ZIP_NAME" $FILES_TO_ZIP
          echo "ZIP 文件生成完成: $ZIP_NAME"
          ls -lh "$ZIP_NAME"
        else
          echo "没有 APK 文件可打包，跳过 ZIP"
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wear-sync-v1.0.${{ github.run_number }}
        path: |
          ./mobile-release.apk
          ./wear-release.apk
        retention-days: 7

    - name: Create Release
      if: ${{ github.event.inputs.push_release == 'true' }}
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        generate_release_notes: true
        files: |
          ${{ github.event.inputs.build_mobile == 'true' && './mobile-release.apk' || '' }}
          ${{ github.event.inputs.build_wear == 'true' && './wear-release.apk' || '' }}