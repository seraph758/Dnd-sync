name: Build and Release APKs

on:
  workflow_dispatch:   # 手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore

    - name: Create signing properties
      run: |
        KEY_PATH=$GITHUB_WORKSPACE/release.keystore
        echo "STORE_FILE=$KEY_PATH" > signing.properties
        echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> signing.properties
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> signing.properties
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties
        ls -l $KEY_PATH

    - name: Build Release APKs
      env:
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
      run: ./gradlew clean assembleRelease

    - name: Copy APKs to root directory
      run: |
        echo "拷贝 APK 到根目录"
  #     MOBILE_PATH=$(find . -path "*/mobile/build/outputs/apk/release/*" -name "*.apk" | head -n 1)
        WEAR_PATH=$(find . -path "*/wear/build/outputs/apk/release/*" -name "*.apk" | head -n 1)
     #  if [ -f "$MOBILE_PATH" ]; then cp "$MOBILE_PATH" ./mobile-release.apk; else echo "错误: 找不到 Mobile APK"; exit 1; fi
        if [ -f "$WEAR_PATH" ]; then cp "$WEAR_PATH" ./wear-release.apk; else echo "错误: 找不到 Wear APK"; exit 1; fi
        ls -lh *.apk

    - name: Create flat ZIP package
      run: |
        echo "生成平铺 ZIP (留作本地备份或未来备用)"
        zip -j ./wear-sync-v1.0.${{ github.run_number }}.zip \
  #       ./mobile-release.apk \
          ./wear-release.apk
        ls -lh ./wear-sync-v1.0.${{ github.run_number }}.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wear-sync-v1.0.${{ github.run_number }}
        # 🎯 这里直接指定两个 APK，GitHub 自动打包下载时就不会再有“内层 ZIP”了
        path: |
  #       ./mobile-release.apk
          ./wear-release.apk
        retention-days: 7

    # 🎯 Release 推送步骤：以后想用时，把下面所有行的 # 号删掉即可
    # - name: Create Release
    #   id: create_release
    #   uses: softprops/action-gh-release@v2
    #   with:
    #     tag_name: v1.0.${{ github.run_number }}
    #     name: Release v1.0.${{ github.run_number }}
    #     generate_release_notes: true
    #     files: |
    #       mobile-release.apk
    #       wear-release.apk
