name: Build Mobile and Wear APKs

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 同時編譯手機端和手錶端
    - name: Build All APKs
      run: ./gradlew assembleDebug

    # 根據你的目錄結構上傳 APK
    - name: Upload All APKs
      uses: actions/upload-artifact@v4
      with:
        name: DND-Sync-Full-Build
        path: |
          Mobile/build/outputs/apk/debug/*.apk
          wear/build/outputs/apk/debug/*.apk

