name: Build and Release APKs

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 1. 解决 Node.js 20 弃用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    # 1. 拉代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 安装 Java 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. 授予执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. 从 Secret 恢复 keystore 文件 (放在根目录)
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

    # 5. 分别为 mobile 和 wear 模块创建签名配置文件
    - name: Create signing properties
      run: |
        # 为 mobile 模块创建
        echo "STORE_FILE=../../release.keystore" > mobile/signing.properties
        echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> mobile/signing.properties
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> mobile/signing.properties
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> mobile/signing.properties
        
        # 为 wear 模块创建
        echo "STORE_FILE=../../release.keystore" > wear/signing.properties
        echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> wear/signing.properties
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> wear/signing.properties
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> wear/signing.properties

    # 6. 编译 Release 版本 APK
    - name: Build Release APKs
      env:
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
      run: ./gradlew clean assembleRelease

    # 7. 提取并重命名 APK
    - name: Rename APKs
      run: |
        echo "正在搜索生成的 APK 文件..."
        MOBILE_PATH=$(find . -path "*/mobile/build/outputs/apk/release/*" -name "*.apk" | head -n 1)
        WEAR_PATH=$(find . -path "*/wear/build/outputs/apk/release/*" -name "*.apk" | head -n 1)

        echo "找到 Mobile APK 路径: $MOBILE_PATH"
        echo "找到 Wear APK 路径: $WEAR_PATH"

        if [ -f "$MOBILE_PATH" ]; then cp "$MOBILE_PATH" mobile-release.apk; else echo "错误: 找不到 Mobile APK"; exit 1; fi
        if [ -f "$WEAR_PATH" ]; then cp "$WEAR_PATH" wear-release.apk; else echo "错误: 找不到 Wear APK"; exit 1; fi
        ls -lh *.apk

    # 8. 上传 Artifact (在 Action 页面显示的附件)
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dnd-sync-apks-v1.0.${{ github.run_number }}
        path: |
          mobile-release.apk
          wear-release.apk
        retention-days: 7 # 附件保存 7 天

    # 9. 创建 GitHub Release (正式发布页面)
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        generate_release_notes: true
        files: |
          mobile-release.apk
          wear-release.apk
