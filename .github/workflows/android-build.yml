name: Build and Release APKs

on:
  workflow_dispatch:   # 手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore

    - name: Create signing properties
      run: |
        KEY_PATH=$GITHUB_WORKSPACE/release.keystore
        echo "STORE_FILE=$KEY_PATH" > signing.properties
        echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> signing.properties
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> signing.properties
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties
        ls -l $KEY_PATH

    - name: Build Release APKs
      env:
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
      run: ./gradlew clean assembleRelease

    - name: Rename APKs
      run: |
        echo "正在搜索生成的 APK 文件..."
        MOBILE_PATH=$(find . -path "*/mobile/build/outputs/apk/release/*" -name "*.apk" | head -n 1)
        WEAR_PATH=$(find . -path "*/wear/build/outputs/apk/release/*" -name "*.apk" | head -n 1)
        echo "找到 Mobile APK 路径: $MOBILE_PATH"
        echo "找到 Wear APK 路径: $WEAR_PATH"
        if [ -f "$MOBILE_PATH" ]; then cp "$MOBILE_PATH" mobile-release.apk; else echo "错误: 找不到 Mobile APK"; exit 1; fi
        if [ -f "$WEAR_PATH" ]; then cp "$WEAR_PATH" wear-release.apk; else echo "错误: 找不到 Wear APK"; exit 1; fi
        ls -lh *.apk

    - name: Create ZIP Package (flat)
      run: |
        echo "创建 ZIP 包，仅包含 APK 文件，不保留目录结构"
        zip -j dnd-sync-v1.0.${{ github.run_number }}.zip \
          mobile-release.apk \
          wear-release.apk
        ls -lh dnd-sync-v1.0.${{ github.run_number }}.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dnd-sync-v1.0.${{ github.run_number }}
        path: dnd-sync-v1.0.${{ github.run_number }}.zip
        retention-days: 7

