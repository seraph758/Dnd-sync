name: Build Signed Mobile and Wear APKs

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 安装 Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 给 gradlew 执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 恢复 keystore 文件
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

    # 创建 local.properties
    - name: Create signing properties
      run: |
        echo "STORE_FILE=../release.keystore" >> signing.properties
        echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> signing.properties
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> signing.properties
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties

    # 编译 release APK
    - name: Build Release APKs
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    # 输出 APK 路径（调试用）
    - name: List APKs
      run: find . -name "*.apk"

    # 上传 Mobile APK
    - name: Upload Mobile Release APK
      uses: actions/upload-artifact@v4
      with:
        name: mobile-release-apk
        path: mobile/build/outputs/apk/release/*.apk
        if-no-files-found: error

    # 上传 Wear APK
    - name: Upload Wear Release APK
      uses: actions/upload-artifact@v4
      with:
        name: wear-release-apk
        path: wear/build/outputs/apk/release/*.apk
        if-no-files-found: error
